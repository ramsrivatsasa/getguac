name: getguac
description: GetGuac — Smart receipt & rewards management
publish_to: 'none'
version: 0.2.34+44

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (replaces Firebase)
  supabase_flutter: ^2.5.6

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.1.2

  # Biometric auth (fingerprint / face unlock)
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Update check + HTTP client
  http: ^1.2.2
  package_info_plus: ^8.0.2
  # file_picker removed for v1 — not used yet, ships compileSdk=34 which breaks builds.
  # Add back when we need PDF/document picking on mobile (use the latest version).

  # Navigation & State
  go_router: ^13.2.4
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.67.0
  flutter_svg: ^2.0.10+1
  # WebView for HTML email rendering. Official Flutter team package — battle-tested,
  # unlike flutter_html 3.0 beta which crashed the app on init (see v0.2.4 → 0.2.5).
  webview_flutter: ^4.10.0
  # Receive shared URLs/text from other apps (Google Maps → "Share to GetGuac")
  # so users can log a trip from a Maps destination with one tap.
  receive_sharing_intent: ^1.8.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# App icon configuration — run: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#15803d"
  adaptive_icon_foreground: "assets/icon/icon-fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/mascot/
    - assets/icon/
