name: Release APK

# Builds the mobile APK and publishes it as a GitHub Release whenever a
# `v*` tag is pushed. The mobile UpdateService polls this releases/latest
# endpoint to discover new versions; without this workflow the endpoint
# returns stale data and in-app update alerts never fire.
#
# Signing: this build uses the Flutter Android template's default debug
# keystore (configured in app/build.gradle.kts). That's deliberately
# matched to what local-built APKs use today so users don't get hit with
# a signature-mismatch reinstall on the first CI-built update.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.76). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pub deps
        working-directory: mobile
        run: flutter pub get

      - name: Build split-per-ABI release APKs
        working-directory: mobile
        run: flutter build apk --release --split-per-abi

      - name: Stage APKs
        run: |
          mkdir -p dist
          cp mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk     dist/
          cp mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk   dist/
          cp mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk        dist/
          ls -la dist

      - name: Build release notes
        id: notes
        run: |
          {
            echo "body<<__EOF__"
            echo "Mobile release ${{ steps.tag.outputs.ref }}"
            echo ""
            echo "**Install:** download \`app-arm64-v8a-release.apk\` (for most phones) and tap to install. The in-app updater will pick this up automatically on next launch."
            echo ""
            echo "---"
            echo ""
            echo "Recent commits:"
            git log -10 --pretty=format:'- %s' --no-decorate
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/app-arm64-v8a-release.apk
            dist/app-armeabi-v7a-release.apk
            dist/app-x86_64-release.apk
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
