<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    GetGuac favicon — avocado mascot in a compact, instantly-readable
    form. Renders at every size browsers ask for (16x16 in tabs through
    180x180 for iOS bookmark icons) because the geometry is pure shapes
    with no fine detail. Next.js auto-generates the <link rel="icon">
    tags from this file's presence at app/icon.svg.
  -->
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#10b981" />
      <stop offset="100%" stop-color="#064e3b" />
    </radialGradient>
    <radialGradient id="fleshG" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#d9f99d" />
      <stop offset="100%" stop-color="#84cc16" />
    </radialGradient>
    <radialGradient id="pitG" cx="38%" cy="32%" r="75%">
      <stop offset="0%"   stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#b45309" />
    </radialGradient>
  </defs>
  <!-- Outer skin -->
  <path
    d="M32 4
       C 18 4, 8 16, 8 32
       C 8 50, 22 60, 32 60
       C 42 60, 56 50, 56 32
       C 56 16, 46 4, 32 4 Z"
    fill="url(#bodyG)"
  />
  <!-- Flesh -->
  <path
    d="M32 11
       C 22 11, 14 20, 14 32
       C 14 46, 24 54, 32 54
       C 40 54, 50 46, 50 32
       C 50 20, 42 11, 32 11 Z"
    fill="url(#fleshG)"
  />
  <!-- Pit -->
  <circle cx="32" cy="34" r="11" fill="url(#pitG)" />
  <!-- Eyes -->
  <circle cx="28" cy="32" r="1.6" fill="#1f2937" />
  <circle cx="36" cy="32" r="1.6" fill="#1f2937" />
  <!-- Smile -->
  <path d="M28 38 Q 32 41 36 38" stroke="#1f2937" stroke-width="1.5" fill="none" stroke-linecap="round" />
</svg>
