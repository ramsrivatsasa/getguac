name: getguac
description: GetGuac — Smart receipt & rewards management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (replaces Firebase)
  supabase_flutter: ^2.5.6

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # Navigation & State
  go_router: ^13.2.4
  provider: ^6.1.2

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.67.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
