<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bef264"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
    <radialGradient id="pit" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="1" stop-color="#451a03"/>
    </radialGradient>
  </defs>

  <!-- Avocado body -->
  <ellipse cx="100" cy="125" rx="55" ry="60" fill="url(#skin)" stroke="#365314" stroke-width="3"/>

  <!-- Pit (face area) -->
  <ellipse cx="100" cy="120" rx="34" ry="38" fill="url(#pit)"/>

  <!-- Eyes -->
  <circle cx="88" cy="115" r="4" fill="#fffbeb"/>
  <circle cx="112" cy="115" r="4" fill="#fffbeb"/>
  <circle cx="88" cy="116" r="2" fill="#1c1917"/>
  <circle cx="112" cy="116" r="2" fill="#1c1917"/>

  <!-- Smile -->
  <path d="M 88 135 Q 100 144 112 135" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- White beard -->
  <path d="M 78 138 Q 70 162 100 168 Q 130 162 122 138 Q 115 152 100 152 Q 85 152 78 138 Z"
        fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Wizard hat -->
  <path d="M 56 92 L 100 18 L 144 92 Z" fill="url(#hat)" stroke="#2e1065" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Hat brim -->
  <ellipse cx="100" cy="92" rx="48" ry="8" fill="#4c1d95" stroke="#2e1065" stroke-width="2"/>
  <!-- Stars on hat -->
  <path d="M 90 60 l 2 5 l 5 1 l -4 3 l 1 5 l -4 -3 l -4 3 l 1 -5 l -4 -3 l 5 -1 z" fill="#fbbf24"/>
  <path d="M 112 75 l 1.5 4 l 4 .5 l -3 2.5 l 1 4 l -3.5 -2 l -3.5 2 l 1 -4 l -3 -2.5 l 4 -.5 z" fill="#fde68a"/>

  <!-- Wand -->
  <line x1="155" y1="115" x2="190" y2="80" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
  <path d="M 188 78 l 1.5 4 l 4 .5 l -3 2.5 l 1 4 l -3.5 -2 l -3.5 2 l 1 -4 l -3 -2.5 l 4 -.5 z"
        transform="translate(-2 -2)" fill="#fbbf24"/>
</svg>
